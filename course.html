<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>My Courses — Cyber Buddy Academy</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/mylogo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <style>
    :root{--accent:#06b6d4;--bg-dark:#0b1220;}
    body{font-family:'Poppins',sans-serif;background:var(--bg-dark);color:#e6f6f8;min-height:100vh;}
    .glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(8px);}
    .glow{color:var(--accent);text-shadow:0 0 20px rgba(6,182,212,0.25);}
    nav a{transition:color 0.2s;}nav a:hover{color:var(--accent);}
    .course-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s;}
    .course-card:hover{transform:translateY(-6px);border-color:rgba(6,182,212,0.35);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
    .course-card img{transition:transform 0.4s;}
    .course-card:hover img{transform:scale(1.05);}
    .h-glow{height:1px;background:linear-gradient(90deg,transparent,rgba(6,182,212,0.5),transparent);}
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/50 backdrop-blur-md border-b border-white/5">
    <div class="max-w-screen-2xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" class="w-10 h-10 rounded-lg" alt="logo">
        <span class="font-bold text-lg glow">Cyber Buddy Academy</span>
      </div>
      <div class="flex items-center gap-6">
        <a href="dashboard.html" class="text-slate-400 text-sm font-semibold hover:text-cyan-400">Dashboard</a>
        <a href="course.html" class="text-cyan-400 text-sm font-semibold">My Courses</a>
        <button id="logoutBtn" class="px-4 py-2 rounded-lg text-sm font-semibold text-red-400 hover:bg-red-500/10 transition">
          <i class="fas fa-sign-out-alt mr-1"></i>Logout
        </button>
      </div>
    </div>
  </nav>
  <div class="h-glow"></div>

  <!-- CONTENT -->
  <div class="max-w-screen-2xl mx-auto px-6 pt-28 pb-16">

    <div class="mb-10">
      <h1 class="text-3xl font-bold glow">My Purchased Courses</h1>
      <p class="text-slate-400 mt-2">Courses you have access to. Click to start learning.</p>
    </div>

    <!-- Loading state -->
    <div id="loadingState" class="text-center py-16">
      <i class="fas fa-circle-notch fa-spin text-cyan-400 text-3xl"></i>
      <p class="text-slate-400 mt-3">Loading your courses...</p>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-16">
      <div class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center" style="background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);">
        <i class="fas fa-lock text-cyan-400 text-2xl"></i>
      </div>
      <h3 class="text-xl font-bold mb-2">No Courses Purchased</h3>
      <p class="text-slate-400 text-sm max-w-sm mx-auto">You don't have access to any courses yet. Contact your admin to grant access.</p>
      <a href="dashboard.html" class="inline-block mt-6 px-6 py-3 rounded-lg font-semibold text-sm" style="background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028;">
        Browse All Courses
      </a>
    </div>

    <!-- Courses grid -->
    <div id="coursesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7 hidden"></div>

  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const loading = document.getElementById('loadingState');
    const empty = document.getElementById('emptyState');
    const grid = document.getElementById('coursesGrid');

    onAuthStateChanged(auth, async user=>{
      if(!user){ window.location='login.html'; return; }

      const userSnap = await getDoc(doc(db,'users',user.uid));
      const userData = userSnap.data();
      const purchased = userData?.purchasedCourses||[];

      if(!purchased.length){
        loading.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      const coursesSnap = await getDocs(collection(db,'courses'));
      let count=0;
      coursesSnap.forEach(c=>{
        if(!purchased.includes(c.id)) return;
        count++;
        const data=c.data();
        grid.innerHTML+=`
          <div class="course-card">
            <div class="overflow-hidden"><img src="${data.image||'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400&q=70'}" class="w-full h-48 object-cover"></div>
            <div class="p-5">
              <span class="text-[10px] uppercase tracking-widest text-cyan-400 font-bold bg-cyan-400/10 px-2 py-1 rounded-full">Enrolled</span>
              <h3 class="font-bold text-base mt-3 mb-2">${data.title}</h3>
              <p class="text-xs text-slate-400 mb-4 line-clamp-2">${data.description||''}</p>
              <a href="web-pentesting.html?id=${c.id}" class="block text-center px-4 py-2.5 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028;">
                <i class="fas fa-play mr-2"></i>Continue Learning
              </a>
            </div>
          </div>`;
      });

      if(!count){
        loading.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      loading.classList.add('hidden');
      grid.classList.remove('hidden');
    });

    document.getElementById('logoutBtn').onclick=async()=>{
      await signOut(auth);
      window.location='login.html';
    };
  </script>
</body>
</html>
