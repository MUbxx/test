<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — Cyber Buddy Academy</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/mylogo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <style>
    :root { --accent:#06b6d4; --bg-dark:#0b1220; }
    body { font-family:'Poppins',sans-serif; background:var(--bg-dark); color:#e6f6f8; min-height:100vh; margin:0; }
    .bg-overlay { position:fixed; inset:0; z-index:-1; }
    .bg-overlay canvas { width:100%; height:100%; display:block; }

    .glass-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(12px); }

    .input-field {
      width:100%; padding:12px 16px;
      background:rgba(255,255,255,0.05); border:1.5px solid rgba(6,182,212,0.2);
      border-radius:10px; color:#e6f6f8; font-family:'Poppins',sans-serif; font-size:0.9rem;
      transition:border-color 0.3s,box-shadow 0.3s; outline:none;
    }
    .input-field:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(6,182,212,0.12); }
    .input-field::placeholder { color:rgba(230,246,248,0.35); }
    .input-field.error { border-color:#f43f5e !important; }

    .btn-primary {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#06b6d4,#0ea5e9); color:#042028;
      font-weight:700; font-size:0.9rem; border:none; border-radius:10px; cursor:pointer;
      transition:transform 0.2s,box-shadow 0.2s; font-family:'Poppins',sans-serif;
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(6,182,212,0.35); }
    .btn-primary:disabled { opacity:0.6; transform:none; cursor:not-allowed; }

    .glow { color:var(--accent); text-shadow:0 0 20px rgba(6,182,212,0.3); }

    .strength-bar { height:4px; border-radius:2px; transition:all 0.3s; }

    .toast {
      position:fixed; bottom:24px; right:24px; z-index:100;
      padding:12px 20px; border-radius:10px; font-size:0.85rem; font-weight:600;
      transition:all 0.35s ease; transform:translateY(80px); opacity:0; pointer-events:none;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:#064e3b; border:1px solid #10b981; color:#6ee7b7; }
    .toast.error { background:#4c0519; border:1px solid #f43f5e; color:#fda4af; }

    .form-wrap { animation:formIn 0.6s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes formIn { from{opacity:0;transform:translateY(28px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    .verify-overlay {
      position:fixed; inset:0; background:rgba(11,18,32,0.92);
      backdrop-filter:blur(12px); z-index:50;
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .verify-overlay.show { display:flex; }
  </style>
</head>
<body>
  <div class="bg-overlay" aria-hidden="true"><canvas id="bg"></canvas></div>

  <!-- Email verification overlay -->
  <div id="verifyOverlay" class="verify-overlay">
    <div class="glass-card rounded-2xl p-8 max-w-md w-full text-center space-y-4">
      <div class="w-16 h-16 bg-cyan-400/10 border border-cyan-400/30 rounded-full flex items-center justify-center mx-auto">
        <i class="fas fa-envelope-open text-cyan-400 text-2xl"></i>
      </div>
      <h2 class="text-xl font-bold glow">Verify Your Email</h2>
      <p class="text-slate-400 text-sm">We've sent a verification link to <strong id="verifyEmail" class="text-white"></strong></p>
      <p class="text-slate-500 text-xs">Check your inbox (and spam) then click the link to activate your account.</p>
      <a href="login.html" class="btn-primary inline-block text-center mt-4">Go to Login</a>
    </div>
  </div>

  <div class="min-h-screen flex items-center justify-center p-4 py-10">
    <div class="form-wrap w-full max-w-md">

      <div class="text-center mb-8">
        <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" alt="Logo" class="w-16 h-16 rounded-xl mx-auto mb-3 border border-cyan-400/20">
        <h1 class="text-2xl font-bold glow">Create Account</h1>
        <p class="text-sm text-slate-400 mt-1">Join Cyber Buddy Academy</p>
      </div>

      <div class="glass-card rounded-2xl p-8 space-y-5">

        <div class="grid grid-cols-1 gap-5">

          <!-- Full Name -->
          <div>
            <label class="block text-xs font-semibold text-cyan-400 uppercase tracking-widest mb-2">Full Name</label>
            <input id="name" type="text" class="input-field" placeholder="Mohamed Mubeen">
          </div>

          <!-- Phone -->
          <div>
            <label class="block text-xs font-semibold text-cyan-400 uppercase tracking-widest mb-2">Phone Number</label>
            <input id="phone" type="tel" class="input-field" placeholder="+91 98765 43210">
          </div>

          <!-- Email -->
          <div>
            <label class="block text-xs font-semibold text-cyan-400 uppercase tracking-widest mb-2">Email Address</label>
            <input id="email" type="email" class="input-field" placeholder="you@email.com">
          </div>

          <!-- Password -->
          <div>
            <label class="block text-xs font-semibold text-cyan-400 uppercase tracking-widest mb-2">Password</label>
            <div class="relative">
              <input id="password" type="password" class="input-field pr-12" placeholder="Min. 8 characters" oninput="checkStrength()">
              <button id="togglePw" type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-cyan-400 transition">
                <i class="fas fa-eye" id="pwIcon"></i>
              </button>
            </div>
            <!-- Strength bar -->
            <div class="mt-2 flex gap-1">
              <div id="s1" class="strength-bar flex-1 bg-slate-700"></div>
              <div id="s2" class="strength-bar flex-1 bg-slate-700"></div>
              <div id="s3" class="strength-bar flex-1 bg-slate-700"></div>
              <div id="s4" class="strength-bar flex-1 bg-slate-700"></div>
            </div>
            <p id="strengthText" class="text-xs mt-1 text-slate-500"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-xs font-semibold text-cyan-400 uppercase tracking-widest mb-2">Confirm Password</label>
            <input id="confirmPw" type="password" class="input-field" placeholder="Re-enter password">
          </div>

        </div>

        <!-- Terms -->
        <label class="flex items-start gap-3 cursor-pointer">
          <input id="terms" type="checkbox" class="mt-1 accent-cyan-400 w-4 h-4">
          <span class="text-xs text-slate-400">I agree to the <a href="#" class="text-cyan-400 hover:underline">Terms of Service</a> and <a href="#" class="text-cyan-400 hover:underline">Privacy Policy</a></span>
        </label>

        <button id="registerBtn" class="btn-primary">
          <i class="fas fa-user-plus mr-2"></i> Create Account
        </button>

        <p class="text-center text-sm text-slate-400">
          Already have an account?
          <a href="login.html" class="text-cyan-400 font-semibold hover:underline ml-1">Sign In</a>
        </p>

      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // Matrix BG
    const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');let drops=[];
    function r(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;drops=Array.from({length:Math.floor(canvas.width/14)},()=>1);}
    r();window.addEventListener('resize',r);
    setInterval(()=>{ctx.fillStyle='rgba(11,18,32,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#06b6d4';ctx.font='13px monospace';drops.forEach((y,i)=>{ctx.fillText(Math.random()>.5?'1':'0',i*14,y*14);if(y*14>canvas.height&&Math.random()>.977)drops[i]=0;drops[i]++;});},50);

    // Password show/hide
    const pw=document.getElementById('password'),pwIcon=document.getElementById('pwIcon');
    document.getElementById('togglePw').onclick=()=>{const v=pw.type==='password';pw.type=v?'text':'password';pwIcon.className=v?'fas fa-eye-slash':'fas fa-eye';};

    // Strength checker
    function checkStrength(){
      const v=document.getElementById('password').value;
      const bars=[document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
      const txt=document.getElementById('strengthText');
      let score=0;
      if(v.length>=8)score++;if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^a-zA-Z0-9]/.test(v))score++;
      const colors=['','#f43f5e','#fb923c','#facc15','#22c55e'];
      const labels=['','Weak','Fair','Good','Strong'];
      bars.forEach((b,i)=>{b.style.background=i<score?colors[score]:'#334155';});
      txt.textContent=v.length?labels[score]:'';txt.style.color=colors[score]||'';
    }

    // Toast
    function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3500);}
  </script>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    document.getElementById('registerBtn').onclick = async()=>{
      const btn = document.getElementById('registerBtn');
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const terms = document.getElementById('terms').checked;

      if(!name||!email||!password){ showToast('Please fill in all required fields','error'); return; }
      if(password.length<8){ showToast('Password must be at least 8 characters','error'); return; }
      if(password!==confirmPw){ showToast('Passwords do not match','error'); return; }
      if(!terms){ showToast('Please accept the terms to continue','error'); return; }

      btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>Creating account...';

      try{
        const res = await createUserWithEmailAndPassword(auth,email,password);
        await sendEmailVerification(res.user);
        await setDoc(doc(db,"users",res.user.uid),{
          name, phone, email, role:"user",
          purchasedCourses:[], createdAt:new Date()
        });
        document.getElementById('verifyEmail').textContent = email;
        document.getElementById('verifyOverlay').classList.add('show');
      }catch(err){
        showToast(err.message.replace('Firebase: ','').replace(/\(auth.*\)/,''),'error');
        btn.disabled=false; btn.innerHTML='<i class="fas fa-user-plus mr-2"></i>Create Account';
      }
    };
  </script>
</body>
</html>
