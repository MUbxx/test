<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard — Cyber Buddy Academy</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/mylogo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <style>
    :root { --accent:#06b6d4; --accent-700:#0891b2; --bg-dark:#0b1220; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body { font-family:'Poppins',sans-serif; background:var(--bg-dark); color:#e6f6f8; overflow:hidden; }

    /* Sidebar */
    #sidebar { transition:width 0.3s ease; width:260px; min-width:260px; background:#070e1a; border-right:1px solid rgba(6,182,212,0.1); }
    #sidebar.collapsed { width:80px; min-width:80px; }
    #sidebar.collapsed .label { display:none; }
    #sidebar.collapsed .logo-text { display:none; }
    #sidebar.collapsed .nav-btn { justify-content:center; padding:12px; }

    .nav-btn {
      display:flex; align-items:center; gap:12px;
      width:100%; padding:11px 16px; border-radius:10px;
      font-size:0.88rem; font-weight:600; cursor:pointer; border:none;
      color:#94a3b8; background:transparent; font-family:'Poppins',sans-serif;
      transition:all 0.2s;
    }
    .nav-btn:hover { background:rgba(6,182,212,0.08); color:#e6f6f8; }
    .nav-btn.active { background:rgba(6,182,212,0.15); color:var(--accent); border-left:3px solid var(--accent); }
    .nav-btn i { width:20px; text-align:center; font-size:0.95rem; }

    /* Glass */
    .glass { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(8px); }
    .glass-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); }

    /* Tabs */
    .tab { display:none; }
    .tab.active { display:block; animation:fadeIn 0.35s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* Course card */
    .course-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:14px; overflow:hidden; transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s; }
    .course-card:hover { transform:translateY(-6px); border-color:rgba(6,182,212,0.35); box-shadow:0 16px 40px rgba(0,0,0,0.4),0 0 20px rgba(6,182,212,0.1); }
    .course-card img { transition:transform 0.4s; }
    .course-card:hover img { transform:scale(1.05); }

    /* Input */
    .input-field {
      width:100%; padding:11px 14px;
      background:rgba(255,255,255,0.05); border:1.5px solid rgba(6,182,212,0.18);
      border-radius:9px; color:#e6f6f8; font-family:'Poppins',sans-serif; font-size:0.88rem;
      outline:none; transition:border-color 0.25s,box-shadow 0.25s;
    }
    .input-field:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(6,182,212,0.1); }
    .input-field::placeholder { color:rgba(230,246,248,0.3); }

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#1e3a4a;border-radius:5px}

    /* Toast */
    .toast {
      position:fixed; bottom:24px; right:24px; z-index:999;
      padding:12px 18px; border-radius:10px; font-size:0.85rem; font-weight:600;
      transition:all 0.3s ease; transform:translateY(60px); opacity:0; pointer-events:none;
    }
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:#064e3b;border:1px solid #10b981;color:#6ee7b7;}
    .toast.error{background:#4c0519;border:1px solid #f43f5e;color:#fda4af;}

    /* Stat card hover */
    .stat-card { transition:transform 0.25s,border-color 0.25s; }
    .stat-card:hover { transform:translateY(-3px); border-color:rgba(6,182,212,0.3) !important; }

    body.light-mode { background:#f0f4f8; color:#0b1220; }
    body.light-mode #sidebar { background:#e4edf7; border-right-color:rgba(6,182,212,0.15); }
    body.light-mode .glass,.glass-card { background:rgba(255,255,255,0.85); border-color:rgba(11,18,32,0.08); }
    body.light-mode .course-card { background:#fff; border-color:rgba(11,18,32,0.1); }
    body.light-mode .nav-btn { color:#475569; }
    body.light-mode .nav-btn:hover { background:rgba(6,182,212,0.06); color:#0b1220; }
    body.light-mode .nav-btn.active { background:rgba(6,182,212,0.12); color:var(--accent-700); }
    body.light-mode .input-field { background:#fff; color:#0b1220; border-color:rgba(11,18,32,0.15); }
    body.light-mode .text-slate-300 { color:#4b5563; }
    body.light-mode .text-slate-400 { color:#64748b; }
    body.light-mode .text-slate-500 { color:#94a3b8; }
  </style>
</head>
<body class="flex h-screen">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="flex flex-col p-4 flex-shrink-0">

    <!-- Logo -->
    <div class="flex items-center justify-between mb-8 px-2 pt-2">
      <div class="flex items-center gap-3">
        <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" class="w-9 h-9 rounded-lg" alt="logo">
        <span class="logo-text font-bold text-lg text-cyan-400">Cyber Buddy</span>
      </div>
      <button id="toggleSidebar" class="text-slate-400 hover:text-cyan-400 transition p-1">
        <i class="fas fa-bars text-sm"></i>
      </button>
    </div>

    <!-- Nav -->
    <nav class="flex-1 space-y-1">
      <p class="label text-[10px] uppercase tracking-widest text-slate-500 font-bold px-3 mb-2">Main</p>

      <button class="nav-btn active" data-tab="dashboard">
        <i class="fas fa-th-large"></i><span class="label">Dashboard</span>
      </button>
      <button class="nav-btn" data-tab="mycourses">
        <i class="fas fa-play-circle"></i><span class="label">My Courses</span>
      </button>
      <button class="nav-btn" data-tab="certificates">
        <i class="fas fa-award"></i><span class="label">Certificates</span>
      </button>
      <button class="nav-btn" data-tab="billing">
        <i class="fas fa-file-invoice"></i><span class="label">Billing</span>
      </button>

      <p class="label text-[10px] uppercase tracking-widest text-slate-500 font-bold px-3 mt-6 mb-2">Account</p>

      <button class="nav-btn" data-tab="profile">
        <i class="fas fa-user-circle"></i><span class="label">Profile</span>
      </button>
      <button class="nav-btn" data-tab="security">
        <i class="fas fa-shield-alt"></i><span class="label">Security</span>
      </button>
    </nav>

    <!-- Logout -->
    <button id="logoutBtn" class="nav-btn mt-4 text-red-400 hover:bg-red-500/10 hover:text-red-300">
      <i class="fas fa-sign-out-alt"></i><span class="label">Sign Out</span>
    </button>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-16 flex items-center justify-between px-8 border-b border-white/5">
      <div>
        <h2 id="viewTitle" class="text-lg font-bold">Dashboard</h2>
        <p id="viewSub" class="text-xs text-slate-500">Welcome back</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
          <input id="searchCourse" class="input-field pl-9 w-56 text-sm" placeholder="Search courses...">
        </div>
        <button id="themeBtn" class="w-9 h-9 rounded-xl border border-white/10 text-cyan-400 flex items-center justify-center hover:border-cyan-400/40 transition">
          <i class="fas fa-moon text-sm"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-8 space-y-8">

      <!-- ── DASHBOARD ── -->
      <section id="dashboard" class="tab active space-y-8">

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-5">
          <div class="glass stat-card p-6 rounded-xl border border-white/5">
            <p class="text-xs text-slate-400 uppercase tracking-wider mb-2">Enrolled</p>
            <h3 id="statEnrolled" class="text-3xl font-bold text-cyan-400">0</h3>
          </div>
          <div class="glass stat-card p-6 rounded-xl border border-white/5">
            <p class="text-xs text-slate-400 uppercase tracking-wider mb-2">Certificates</p>
            <h3 id="statCerts" class="text-3xl font-bold text-cyan-400">0</h3>
          </div>
          <div class="glass stat-card p-6 rounded-xl border border-white/5">
            <p class="text-xs text-slate-400 uppercase tracking-wider mb-2">Hours Learned</p>
            <h3 class="text-3xl font-bold text-cyan-400">24</h3>
          </div>
        </div>

        <div>
          <h3 class="text-lg font-bold mb-5">Available Courses</h3>
          <div id="coursesGrid" class="grid grid-cols-3 gap-6"></div>
        </div>
      </section>

      <!-- ── MY COURSES ── -->
      <section id="mycourses" class="tab space-y-5">
        <h3 class="text-lg font-bold">My Learning Path</h3>
        <div id="myCoursesGrid" class="grid grid-cols-3 gap-6"></div>
      </section>

      <!-- ── CERTIFICATES ── -->
      <section id="certificates" class="tab space-y-5">
        <h3 class="text-lg font-bold">Certificates</h3>
        <div id="certList" class="space-y-3"></div>
      </section>

      <!-- ── BILLING ── -->
      <section id="billing" class="tab space-y-5">
        <h3 class="text-lg font-bold">Billing & Invoices</h3>
        <div id="invoiceList" class="space-y-3"></div>
      </section>

      <!-- ── PROFILE ── -->
      <section id="profile" class="tab">
        <div class="glass rounded-xl p-8 max-w-lg border border-white/5 space-y-5">
          <h3 class="text-lg font-bold">Edit Profile</h3>
          <div>
            <label class="block text-xs text-cyan-400 uppercase tracking-widest mb-2">Display Name</label>
            <input id="editName" class="input-field" placeholder="Your name">
          </div>
          <div>
            <label class="block text-xs text-cyan-400 uppercase tracking-widest mb-2">Email (read-only)</label>
            <input id="editEmail" class="input-field opacity-60 cursor-not-allowed" readonly>
          </div>
          <div>
            <label class="block text-xs text-cyan-400 uppercase tracking-widest mb-2">Phone Number</label>
            <input id="editPhone" class="input-field" placeholder="+91 98765 43210">
          </div>
          <button id="saveProfile" class="px-6 py-3 rounded-lg font-semibold text-sm" style="background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028;">
            Save Changes
          </button>
        </div>
      </section>

      <!-- ── SECURITY ── -->
      <section id="security" class="tab">
        <div class="glass rounded-xl p-8 max-w-lg border border-white/5 space-y-5">
          <h3 class="text-lg font-bold">Account Security</h3>
          <p class="text-sm text-slate-400">Send a password reset link to your registered email address.</p>
          <button id="resetBtn" class="px-6 py-3 rounded-lg font-semibold text-sm" style="background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;">
            <i class="fas fa-key mr-2"></i>Send Password Reset Link
          </button>
        </div>
      </section>

    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    // Toast helper
    function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3500);}

    // Theme
    let light=localStorage.getItem('cb-theme')==='light';
    const themeBtn=document.getElementById('themeBtn');
    function applyTheme(){document.body.classList.toggle('light-mode',light);themeBtn.innerHTML=light?'<i class="fas fa-sun text-sm"></i>':'<i class="fas fa-moon text-sm"></i>';localStorage.setItem('cb-theme',light?'light':'dark');}
    applyTheme();
    themeBtn.onclick=()=>{light=!light;applyTheme();};

    // Sidebar toggle
    document.getElementById('toggleSidebar').onclick=()=>{document.getElementById('sidebar').classList.toggle('collapsed');};

    // Tab switching
    const tabMeta={
      dashboard:['Dashboard','Explore your cybersecurity courses'],
      mycourses:['My Learning','Continue where you left off'],
      certificates:['Certificates','Download your achievements'],
      billing:['Billing','View invoices and payments'],
      profile:['Profile','Manage your account details'],
      security:['Security','Protect your account'],
    };
    document.querySelectorAll('.nav-btn[data-tab]').forEach(btn=>{
      btn.onclick=()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const m=tabMeta[btn.dataset.tab]||['Dashboard',''];
        document.getElementById('viewTitle').textContent=m[0];
        document.getElementById('viewSub').textContent=m[1];
      };
    });
  </script>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { collection, getDocs, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const coursesGrid = document.getElementById('coursesGrid');
    const myCoursesGrid = document.getElementById('myCoursesGrid');
    const certList = document.getElementById('certList');
    const invoiceList = document.getElementById('invoiceList');

    let userData = null;
    let allCourses = [];

    // Auth check
    onAuthStateChanged(auth, user=>{
      if(!user){ window.location='login.html'; return; }
      onSnapshot(doc(db,'users',user.uid), snap=>{
        userData = snap.data();
        if(!userData) return;
        document.getElementById('editName').value = userData.name||'';
        document.getElementById('editEmail').value = userData.email||'';
        document.getElementById('editPhone').value = userData.phone||'';
        document.getElementById('statEnrolled').textContent = (userData.purchasedCourses||[]).length;
        loadCourses();
        loadCertificates();
        loadInvoices();
      });
    });

    // Course card builder
    function courseCard(id,data,access){
      return `
        <div class="course-card">
          <div class="overflow-hidden"><img src="${data.image||'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400&q=70'}" class="w-full h-40 object-cover"></div>
          <div class="p-4 space-y-2">
            <h4 class="font-semibold text-sm leading-snug">${data.title}</h4>
            <p class="text-xs text-slate-400 line-clamp-2">${data.description||''}</p>
            ${access
              ? `<a href="course.html?id=${id}" class="inline-block mt-2 px-4 py-2 rounded-lg text-xs font-bold" style="background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028">Start Learning</a>`
              : `<button class="mt-2 px-4 py-2 rounded-lg text-xs font-semibold bg-slate-700/60 text-slate-400 cursor-not-allowed"><i class="fas fa-lock mr-1"></i>Locked</button>`}
          </div>
        </div>`;
    }

    async function loadCourses(){
      if(!userData) return;
      coursesGrid.innerHTML=''; myCoursesGrid.innerHTML=''; allCourses=[];
      const snap = await getDocs(collection(db,'courses'));
      if(snap.empty){ coursesGrid.innerHTML='<p class="text-slate-500 col-span-3">No courses available yet.</p>'; return; }
      snap.forEach(c=>{
        const data=c.data(), id=c.id;
        allCourses.push({id,...data});
        const access=(userData.purchasedCourses||[]).includes(id);
        const card=courseCard(id,data,access);
        coursesGrid.innerHTML+=card;
        if(access) myCoursesGrid.innerHTML+=card;
      });
      if(myCoursesGrid.innerHTML==='') myCoursesGrid.innerHTML='<p class="text-slate-500 col-span-3">No purchased courses yet. Contact admin for access.</p>';
    }

    // Search
    document.getElementById('searchCourse').addEventListener('input',e=>{
      const q=e.target.value.toLowerCase();
      coursesGrid.innerHTML='';
      allCourses.filter(c=>c.title.toLowerCase().includes(q)).forEach(c=>{
        const access=(userData?.purchasedCourses||[]).includes(c.id);
        coursesGrid.innerHTML+=courseCard(c.id,c,access);
      });
    });

    // Certificates
    async function loadCertificates(){
      certList.innerHTML='<p class="text-slate-500 text-sm animate-pulse">Loading certificates...</p>';
      try{
        const res=await fetch("https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/certificates.json");
        if(!res.ok) throw new Error('File not reachable');
        const data=await res.json();
        const user=auth.currentUser;
        let arr=Array.isArray(data)?data:(data.certificates||[]);
        const mine=arr.filter(c=>c.email&&c.email.toLowerCase()===user.email.toLowerCase());
        if(!mine.length){ certList.innerHTML='<p class="text-slate-500 text-sm">No certificates found for your account.</p>'; document.getElementById('statCerts').textContent=0; return; }
        certList.innerHTML='';
        mine.forEach(cert=>{
          certList.innerHTML+=`
            <div class="glass-card rounded-xl p-4 flex items-center justify-between border border-white/5">
              <div>
                <h4 class="font-semibold text-cyan-400">${cert.course}</h4>
                <p class="text-xs text-slate-400 mt-1">${cert.type||'Certificate'}${cert.duration?' • '+cert.duration:''}</p>
              </div>
              <a href="certificate.html?id=${cert.certId}" class="px-4 py-2 rounded-lg text-xs font-bold" style="background:rgba(6,182,212,0.15);color:#06b6d4;border:1px solid rgba(6,182,212,0.3)">
                <i class="fas fa-external-link-alt mr-1"></i>View
              </a>
            </div>`;
        });
        document.getElementById('statCerts').textContent=mine.length;
      }catch(err){
        certList.innerHTML='<p class="text-red-400 text-sm"><i class="fas fa-exclamation-triangle mr-1"></i>Failed to load certificates. Check your JSON file.</p>';
        console.error('Cert error:',err);
      }
    }

    // Billing
    async function loadInvoices(){
      invoiceList.innerHTML='<p class="text-slate-500 text-sm animate-pulse">Loading invoices...</p>';
      try{
        const res=await fetch("https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/bills.json");
        if(!res.ok) throw new Error('File not reachable');
        const data=await res.json();
        const user=auth.currentUser;
        let arr=Array.isArray(data)?data:(data.bills||[]);
        const mine=arr.filter(b=>b.email&&b.email.toLowerCase()===user.email.toLowerCase());
        if(!mine.length){ invoiceList.innerHTML='<p class="text-slate-500 text-sm">No billing records found.</p>'; return; }
        invoiceList.innerHTML='';
        mine.forEach(bill=>{
          invoiceList.innerHTML+=`
            <div class="glass-card rounded-xl p-4 flex items-center justify-between border border-white/5">
              <div>
                <h4 class="font-semibold text-green-400">${bill.course}</h4>
                <p class="text-xs text-slate-400 mt-1">₹${bill.amount} • ${bill.date}${bill.paymentMode?' • '+bill.paymentMode:''}</p>
              </div>
              <a href="${bill.verifyUrl}" target="_blank" class="px-4 py-2 rounded-lg text-xs font-bold" style="background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.3)">
                <i class="fas fa-check-circle mr-1"></i>Verify
              </a>
            </div>`;
        });
      }catch(err){
        invoiceList.innerHTML='<p class="text-red-400 text-sm"><i class="fas fa-exclamation-triangle mr-1"></i>Failed to load billing data.</p>';
        console.error('Billing error:',err);
      }
    }

    // Profile update
    document.getElementById('saveProfile').onclick=async()=>{
      const user=auth.currentUser;
      await updateDoc(doc(db,'users',user.uid),{
        name:document.getElementById('editName').value,
        phone:document.getElementById('editPhone').value
      });
      showToast('Profile updated successfully','success');
    };

    // Password reset
    document.getElementById('resetBtn').onclick=async()=>{
      const user=auth.currentUser;
      await sendPasswordResetEmail(auth,user.email);
      showToast('Password reset email sent to '+user.email,'success');
    };

    // Logout
    document.getElementById('logoutBtn').onclick=async()=>{
      await signOut(auth);
      window.location='login.html';
    };
  </script>
</body>
</html>
